<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Studio Möbius</title>

<style>

body{
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
color:#e6e9ed;

background:
radial-gradient(circle at center,
#323842 0%,
#2a2f36 55%,
#1e2329 100%);
}

.container{
width:100%;
max-width:760px;
padding:2rem;
display:flex;
flex-direction:column;
align-items:center;
gap:1.6rem;
}

.logo{
width:420px;
max-width:80vw;
opacity:.75;
filter:drop-shadow(0 8px 18px rgba(0,0,0,.35));
}

.tagline{
font-size:clamp(2rem,5vw,3rem);
font-weight:300;
color:#c4ccd4;
}

.services{
max-width:620px;
font-size:clamp(.95rem,2vw,1.1rem);
line-height:1.55;
letter-spacing:.8px;
color:#aeb7c0;
opacity:.88;
}

/* STAMP */

.stamp-wrap{
margin-top:1rem;
transform:rotate(-7deg);
opacity:.75;
}

.stamp{
width:240px;
height:240px;
}

.stamp svg{
width:100%;
height:100%;
}

/* ring */

.stamp circle{
fill:none;
stroke:rgba(210,216,224,.55);
stroke-width:6;
}

/* curved text */

.stamp text{
fill:rgba(210,216,224,.75);
font-size:16px;
letter-spacing:3px;
font-family:"Arial Narrow","Helvetica Neue",Arial,sans-serif;
}

/* tux */

.tux{
position:absolute;
width:70px;
transform:translate(-50%,-50%);
left:50%;
top:50%;
filter:grayscale(1) contrast(1.2);
opacity:.9;
}

/* contact */

.contact{
margin-top:8px;
font-size:.98rem;
color:#b8c0c8;
opacity:.68;
}

</style>

</head>


<body>

<div class="container">

<img src="images/logo.png" class="logo" alt="Studio Möbius">

<div class="tagline">Terrain Intelligence</div>

<div class="services">
GIS Modelling · Coastal Change Analysis · Environmental Terrain Visualisation
</div>


<div class="stamp-wrap">

<div class="stamp">

<svg viewBox="0 0 300 300">

<defs>

<path id="circlePath"
d="
M150,150
m-110,0
a110,110 0 1,1 220,0
a110,110 0 1,1 -220,0
"/>

</defs>

<circle cx="150" cy="150" r="110"/>

<text>

<textPath href="#circlePath" startOffset="50%" text-anchor="middle">

LINUX • STERCORE PINGUINI AGITUR

</textPath>

</text>

</svg>

<img src="images/Tux.png" class="tux" alt="Linux Penguin">

</div>

</div>


<div class="contact">
contact@studiomobius.co.uk
</div>

</div>

</body>
</html>
