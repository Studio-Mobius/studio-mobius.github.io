<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio Möbius</title>

<style>
body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: #e6e9ed;
    background:
        radial-gradient(circle at center,
        #323842 0%,
        #2a2f36 55%,
        #1e2329 100%);
}

.container {
    width: 100%;
    max-width: 760px;
    padding: 2rem 1.25rem 2.5rem;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
}

.logo {
    width: 420px;
    max-width: 78vw;
    opacity: 0.76;
    filter: drop-shadow(0 8px 18px rgba(0,0,0,0.35));
    -webkit-user-drag: none;
    user-select: none;
}

.tagline {
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 300;
    color: #c4ccd4;
}

.services {
    max-width: 620px;
    font-size: clamp(0.95rem, 2vw, 1.1rem);
    line-height: 1.55;
    letter-spacing: 0.8px;
    color: #aeb7c0;
    opacity: 0.88;
}

.stamp-wrap{
    position: fixed;
    bottom: 28px;
    right: 28px;
    transform: rotate(-12deg);
    opacity: 0.55;
    pointer-events: none;
}

.stamp {
    position: relative;
    width: 140px;
    height: 140px;
}

.stamp svg {
    width: 100%;
    height: 100%;
    overflow: visible;
    display: block;
}

.stamp text {
    fill: rgba(210,216,224,0.82);
    font-size: 12px;
    letter-spacing: 0.9px;
    font-family: "Arial Narrow", "Helvetica Neue", Arial, sans-serif;
    text-transform: uppercase;
}

.tux {
    position: absolute;
    width: 34px;
    height: auto;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    filter: grayscale(1) contrast(1.18);
    opacity: 0.92;
    -webkit-user-drag: none;
    user-select: none;
}

.contact {
    margin-top: 8px;
    font-size: 0.98rem;
    color: #b8c0c8;
    opacity: 0.68;
    letter-spacing: 0.3px;
}

@media (max-width: 640px) {
    .stamp {
        width: 130px;
        height: 130px;
    }

    .stamp text {
        font-size: 11px;
        letter-spacing: 0.7px;
    }

    .tux {
        width: 32px;
    }
}
</style>
</head>

<body>
<div class="container">

    <img src="images/logo.png" class="logo" draggable="false" alt="Studio Möbius logo">

    <div class="tagline">Terrain Intelligence</div>

    <div class="services">
        GIS Modelling · Coastal Change Analysis · Environmental Terrain Visualisation
    </div>

    <div class="stamp-wrap">
        <div class="stamp">
            <svg viewBox="0 0 300 300" aria-label="Linux stamp">
                <defs>
                    <!-- path starts at TOP of circle -->
                    <path id="circlePath"
                          d="M150,92
                             a58,58 0 1,1 0,116
                             a58,58 0 1,1 0,-116" />
                </defs>

                <text>
                    <textPath href="#circlePath" startOffset="0%">
                        LINUX • STERCORE PINGUINI AGITUR •
                    </textPath>
                </text>
            </svg>

            <img src="images/Tux.png" class="tux" draggable="false" alt="Linux Penguin">
        </div>
    </div>

    <div class="contact">contact@studiomobius.co.uk</div>

</div>
</body>
</html>
