<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio Möbius</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,400&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,400&display=swap" rel="stylesheet">
<style>
body {
    background:
        radial-gradient(circle at center,
        #323842 0%,
        #2a2f36 55%,
        #1e2329 100%);

    color: #e6e9ed;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

    margin: 0;

    display: flex;
    justify-content: center;
    align-items: center;

    min-height: 100vh;
    text-align: center;
}

.container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2rem;
    padding: 2rem 1.5rem;
}

.logo {
    width: 400px;
    max-width: 75vw;
    height: auto;
    opacity: 0.75;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    -webkit-user-drag: none;
    user-select: none;
}

.tagline {
    color: #b8c0c8;
    font-weight: 400;
    font-size: 2rem;
    letter-spacing: 0.6px;
}

.services {
    color: #b8c0c8;
    font-size: 14px;
    letter-spacing: 1px;
    margin-top: 10px;
    opacity: 0.85;
    line-height: 1.5;
    max-width: 90vw;
}

.contact {
    font-size: 13px;
    margin-top: 10px;
    opacity: 0.65;
}

.penguin {
    margin-top: 20px;
    -webkit-touch-callout: none;
}

.tux {
    width: 32px;
    height: auto;
    cursor: pointer;
    filter:
        drop-shadow(0 0 8px rgba(160,200,255,0.45))
        drop-shadow(0 0 18px rgba(120,170,255,0.25));
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    -webkit-user-drag: none;
    user-select: none;
.penguin-poo {

    font-family: "Cormorant Garamond", serif;
    font-size: 12px;

    margin-top: 8px;

    letter-spacing: 0.6px;
    color: #aab3bd;

    opacity: 0;

    transition: opacity 2.8s ease;
}

/* slow reveal after page loads */

.penguin-poo.reveal {
    opacity: 0.35;
}

/* hover boost */

}
filter:
drop-shadow(0 0 6px rgba(160,200,255,0.35))
drop-shadow(0 0 14px rgba(120,170,255,0.18));
filter: drop-shadow(0 8px 18px rgba(0,0,0,0.35));
</style>
</head>

<body>
<div class="container">
    <img src="images/logo.png" class="logo" draggable="false" alt="">
    <div class="tagline">Terrain Intelligence</div>

    <div class="services">
        GIS Modelling · Coastal Change Analysis · Environmental Terrain Visualisation
    </div>

    <div class="penguin">
        <img src="images/Tux.png" class="tux" draggable="false" alt="">
        <div class="penguin-poo">Stercore pinguini agitur.</div>
    </div>

    <div class="contact">
        contact@studiomobius.co.uk
    </div>
</div>
</body>
</html>
