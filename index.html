<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Studio Möbius</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,400&display=swap" rel="stylesheet">

<style>

body {

    background:
        radial-gradient(circle at center,
        #323842 0%,
        #2a2f36 55%,
        #1e2329 100%);

    color:#e6e9ed;

    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;

    margin:0;

    display:flex;
    justify-content:center;
    align-items:center;

    min-height:100vh;

    text-align:center;

}

/* main layout */

.container {

    display:flex;
    flex-direction:column;
    align-items:center;

    gap:2rem;

    padding:2rem;

}

/* logo */

.logo {

    width:420px;
    max-width:80vw;

    opacity:.75;

    filter:drop-shadow(0 8px 18px rgba(0,0,0,.35));

}

/* tagline */

.tagline {

    font-size:2rem;
    color:#b8c0c8;

}

/* services */

.services {

    font-size:14px;
    letter-spacing:1px;

    color:#b8c0c8;

    opacity:.85;

}

/* contact */

.contact {

    font-size:13px;
    opacity:.65;

}

/* linux stamp */

.linux-seal {

    margin-top:20px;

    padding:18px 24px;

    border:1px solid rgba(170,180,190,.25);
