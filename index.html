<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Studio Möbius</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #e6e9ed;
      background:
        radial-gradient(circle at center,
          #323842 0%,
          #2a2f36 55%,
          #1e2329 100%);
    }

    .container {
      width: 100%;
      max-width: 760px;
      padding: 2rem 1.25rem 2.5rem;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .logo {
      width: 420px;
      max-width: 78vw;
      height: auto;
      opacity: 0.76;
      filter: drop-shadow(0 8px 18px rgba(0,0,0,0.35));
      -webkit-user-drag: none;
      user-select: none;
    }

    .tagline {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 300;
      color: #c4ccd4;
      line-height: 1.1;
    }

    .services {
      max-width: 620px;
      font-size: clamp(0.95rem, 2vw, 1.1rem);
      line-height: 1.55;
      letter-spacing: 0.8px;
      color: #aeb7c0;
      opacity: 0.88;
    }

    .stamp-wrap {
      margin-top: 0.8rem;
      transform: rotate(-8deg);
      opacity: 0.72;
    }

    .stamp {
      width: 210px;
      height: 210px;
      border: 6px solid rgba(210, 216, 224, 0.55);
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
      box-shadow:
        inset 0 0 8px rgba(255,255,255,0.04),
        0 0 12px rgba(0,0,0,0.28);
      background: rgba(255,255,255,0.01);
    }

    .stamp-top,
    .stamp-bottom {
      font-family: "Arial Narrow", "Helvetica Neue", Arial, sans-serif;
      text-transform: uppercase;
      color: rgba(214, 220, 228, 0.78);
    }

    .stamp-top {
      font-size: 18px;
      letter-spacing: 5px;
      margin-bottom: 0.5rem;
    }

    .stamp-bottom {
      font-size: 13px;
      letter-spacing: 3px;
      margin-top: 0.55rem;
    }

    .tux {
      width: 72px;
      height: auto;
      filter: grayscale(1) contrast(1.18) brightness(1.04);
      opacity: 0.9;
      -webkit-user-drag: none;
      user-select: none;
    }

    .contact {
      margin-top: 0.25rem;
      font-size: 0.98rem;
      color: #b8c0c8;
      opacity: 0.68;
      letter-spacing: 0.3px;
    }

    @media (max-width: 640px) {
      .stamp {
        width: 180px;
        height: 180px;
      }

      .stamp-top {
        font-size: 15px;
        letter-spacing: 4px;
      }

      .stamp-bottom {
        font-size: 11px;
        letter-spacing: 2.4px;
      }

      .tux {
        width: 60px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="images/logo.png" class="logo" draggable="false" alt="Studio Möbius logo">

    <div class="tagline">Terrain Intelligence</div>

    <div class="services">
      GIS Modelling · Coastal Change Analysis · Environmental Terrain Visualisation
    </div>

    <div class="stamp-wrap">
      <div class="stamp">
        <div class="stamp-top">Linux</div>
        <img src="images/Tux.png" class="tux" draggable="false" alt="Linux penguin">
        <div class="stamp-bottom">Approved</div>
      </div>
    </div>

    <div class="contact">contact@studiomobius.co.uk</div>
  </div>
</body>
</html>
