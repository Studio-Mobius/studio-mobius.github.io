<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio Möbius</title>

<style>
body {
    background-color: #2a2f36;
    color: #e6e9ed;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    margin: 0;

    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
}

.container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2rem;
}

.logo {
    width: 400px;   /* ← larger */
    max-width: 75vw; /* responsive */
    height: auto;
    opacity: 0.75;
}

.tagline {
    color: #b8c0c8;
    font-weight: 400;
    font-size: 2.0rem;
    letter-spacing: 0.6px;
}
.services {
    color: #b8c0c8;
    font-size: 14px;
    letter-spacing: 1px;
    margin-top: 40px;
    opacity: 0.85;
}
.contact {
    font-size: 14px;
    margin-top: 12px;
    margin-top: 40px;
    opacity: 0.7;
}
.tux {
    filter: drop-shadow(0 0  12px rgba(255,255,255,0,0.35))
}
</style>
</head>

<body>

<div class="container">
    <img src="images/logo.png" class="logo" alt="Studio Möbius Logo">
    <div class="tagline">Terrain Intelligence</div>
    <div class="services">
        GIS Modelling · Coastal Change Analysis · Environmental Terrain Visualisaation
    </div>
    <div style="margin-top:200px;">
    <img src="images/Tux.png" width="50" class="tux" style="margin-top:40px;">
  <div class="contact">
        contact@studiomobius.co.uk  
  </div>
</div>

</body>
</html>
