<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio Möbius</title>

<style>
body {
    background-color: #2a2f36;
    color: #e6e9ed;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
}

.container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2rem;
}

.logo {
    width: 400px;   /* ← larger */
    max-width: 75vw; /* responsive */
    height: auto;
    opacity: 0.75;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    -webkit-user-drag: none;
    user-select: none;
}

.tagline {
    color: #b8c0c8;
    font-weight: 400;
    font-size: 2.0rem;
    letter-spacing: 0.6px;
}
.services {
    color: #b8c0c8;
    font-size: 14px;
    letter-spacing: 1px;
    margin-top: 40px;
    opacity: 0.85;
}
.contact {
    font-size: 13px;
    margin-top: 18px;
    opacity: 0.65;
}
.penguin {
    margin-top: 40px;
    -webkit-touch-callout: none;

}

.tux {
    width: 32px;
    height: auto;
    cursor: pointer;
    filter:
        drop-shadow(0 0 8px rgba(160,200,255,0.45))
        drop-shadow(0 0 18px rgba(120,170,255,0.25));
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-user-drag: none;

.penguin-poo {
    font-size: 10px;
    margin-top: 8px;

    font-style: italic;
    letter-spacing: 0.4px;

    color: #9aa3ad;   /* softer grey */

    opacity: 0;
    transition: opacity 1.4s ease;
}

.penguin:hover .penguin-poo {
    opacity: 0.28;     /* much softer */
    transition-delay: 1.2s;
}

</style>
</head>

<body>

<div class="container">
    <img src="images/logo.png" class="logo" draggable="false" alt="">
    <div class="tagline">Terrain Intelligence</div>
    <div class="services">
        GIS Modelling · Coastal Change Analysis · Environmental Terrain Visualisation
    </div>
    <div class="penguin">
    <img src="images/Tux.png" class="tux" draggable="false" alt="">
    <div class="penguin-poo">
    <em>Stercore pinguini agitur.</em>
</div>
    </div>

    <div class="contact">
        contact@studiomobius.co.uk
    </div>
</div>

</div>
</body>

</html>
